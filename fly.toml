# fly.toml app configuration file generated for scorched-search-twilight-orchard-4581 on 2026-05-13T13:48:30-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'scorched-search-twilight-orchard-4581'
primary_region = 'ord'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
PORT = '8000'
DEBUG = 'False'
POSTGRES_HOST = 'localhost'
POSTGRES_PORT = '5432'
POSTGRES_DB = 'scorched_search'
POSTGRES_USER = 'postgres'
POSTGRES_PASSWORD = 'postgres'

[processes]
  app = "gunicorn mysite.wsgi:application --bind 0.0.0.0:8000"
  worker = "python manage.py run_worker"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  processes = ['worker']

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'

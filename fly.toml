# fly.toml app configuration file generated for careerscrape on 2026-05-14T19:05:52-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'careerscrape'
primary_region = 'ord'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  DEBUG = 'False'
  PORT = '8000'
  POSTGRES_DB = 'scorched_search'
  POSTGRES_HOST = 'localhost'
  POSTGRES_PASSWORD = 'postgres'
  POSTGRES_PORT = '5432'
  POSTGRES_USER = 'postgres'

[processes]
  app = 'gunicorn mysite.wsgi:application --bind 0.0.0.0:8000'
  worker = 'sh /code/jobscrape.sh'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 2
  memory_mb = 1024
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  processes = ['worker']

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
